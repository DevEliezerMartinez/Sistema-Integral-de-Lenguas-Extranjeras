upstream backend {
    server backend:9000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    # Buffers para headers grandes (cookies de sesion Laravel/Sanctum)
    large_client_header_buffers 4 16k;
    client_header_buffer_size 4k;

    # Aumentar tamaños de buffer para Laravel
    client_max_body_size 20M;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Rutas de API - Laravel Backend
    location ~ ^/(api|sanctum) {
        # Reescribir para que Laravel maneje las rutas
        rewrite ^/(.*)$ /index.php?$args last;
    }

    # Procesar PHP para el backend
    location ~ \.php$ {
        # Pasar a PHP-FPM
        fastcgi_pass backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        include fastcgi_params;

        # Headers importantes para Laravel / Sanctum
        fastcgi_param HTTP_HOST        $host;
        fastcgi_param SERVER_NAME      $host;
        fastcgi_param HTTP_COOKIE      $http_cookie;
        fastcgi_param HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_PORT  $server_port;

    }

    # Archivos estaticos del backend (storage, etc)
    location ~ ^/(storage|vendor) {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # Frontend - React SPA
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Optimizaciones de cache para assets estaticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}