version: '3.8'

services:
  # Backend Laravel con PHP-FPM
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: lenguas_backend
    volumes:
      - ./Back:/var/www/html
      - ./Back/database:/var/www/html/database
      - ./Back/storage:/var/www/html/storage
    environment:
      - APP_NAME=Laravel
      - APP_ENV=production
      - APP_KEY=base64:ET19+3f1MSu/t30pgvJPjoU+81c2tl/OxKcSIN/jexw=
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - FRONTEND_URL=http://localhost
      - SANCTUM_STATEFUL_DOMAINS=localhost,127.0.0.1
      - SESSION_DRIVER=cookie
      - SESSION_DOMAIN=null
      - SESSION_SECURE_COOKIE=false
      - SESSION_SAME_SITE=lax
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - LOG_CHANNEL=stderr
    networks:
      - lenguas_network
    restart: unless-stopped

  # Frontend React servido por Nginx
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost
    container_name: lenguas_frontend
    networks:
      - lenguas_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lenguas_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./Back/storage/app/public:/var/www/html/public/storage:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lenguas_network
    restart: unless-stopped

networks:
  lenguas_network:
    driver: bridge
